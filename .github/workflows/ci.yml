name: Build abi3 wheel for frida-python

on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: 'Frida 版本 (留空则自动获取最新)'
        required: false
        default: ''
  schedule:
    - cron: '0 0 * * 0'  # 每周日凌晨自动运行

jobs:
  build-abi3-wheel:
    runs-on: windows-latest
    steps:
      - name: Checkout frida-python
        uses: actions/checkout@v4
        with:
          repository: frida/frida-python
          ref: ${{ github.event.inputs.frida_version || 'latest' }}
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: pip install build wheel

      - name: Setup MSVC (msvc-kit)
        uses: loonghao/msvc-kit@v1
        with:
          arch: x64

      - name: Build abi3 wheel
        run: python setup.py bdist_wheel --py-limited-api=cp311
        env:
          CC: cl.exe
          CXX: cl.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frida-abi3-wheel
          path: ./dist/*.whl
