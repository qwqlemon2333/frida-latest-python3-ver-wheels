name: Build abi3 wheel for frida-python

on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: 'Frida 版本（留空则自动获取最新）'
        required: false
        default: ''
  schedule:
    - cron: '0 0 * * 0'

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      frida_version: ${{ steps.get_tag.outputs.version }}
    steps:
      - name: 获取最新 Frida release 标签
        id: get_tag
        run: |
          if [ -n "${{ github.event.inputs.frida_version }}" ]; then
            echo "version=${{ github.event.inputs.frida_version }}" >> $GITHUB_OUTPUT
          else
            LATEST=$(curl -s https://api.github.com/repos/frida/frida/releases/latest | jq -r .tag_name)
            VERSION=${LATEST#v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

  build-abi3-wheel:
    needs: get-version
    runs-on: windows-latest
    steps:
      - name: Checkout frida-python
        uses: actions/checkout@v4
        with:
          repository: frida/frida-python
          ref: ${{ needs.get-version.outputs.frida_version }}
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: pip install build wheel

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build abi3 wheel
        run: python setup.py bdist_wheel --py-limited-api=cp311
        env:
          CC: cl.exe
          CXX: cl.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frida-abi3-wheel
          path: ./dist/*.whl
